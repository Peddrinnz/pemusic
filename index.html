<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <title>peMusic</title>
</head>

<body>

    <div class="container">
        <aside class="sidebar">
            <h2>peMusic</h2>
            <nav>
                <ul>
                    <li>
                        <i class="fa-solid fa-house"></i>
                        Home
                    </li>

                    <li>
                        <i class="fa-solid fa-magnifying-glass"></i>
                        Buscar
                    </li>

                    <li>
                        <i class="fa-solid fa-list"></i>
                        Playlists
                    </li>

                    <li>
                        <i class="fa-solid fa-heart"></i>
                        Favoritos
                    </li>
                </ul>
            </nav>
        </aside>

        <main class="main">
            <h1>Suas músicas</h1>
            <div class="music-list">
                <div class="music-card">
                    <img src="covers/music1.jpg" alt="Capa da música">
                    <h3 class="music-title">Nome da Música</h3>
                    <p class="music-artist">Artista</p>
                    <div class="music-buttons">
                        <button class="play-btn">
                            <i class="fa-solid fa-play"></i>
                        </button>
                        <button class="fav-btn">
                            <i class="fa-regular fa-heart"></i>
                        </button>
                    </div>
                </div>

                <div class="music-card">
                    <img src="covers/music2.jpg" alt="Capa da música">
                    <h3 class="music-title">Outra Música</h3>
                    <p class="music-artist">Artista</p>
                    <div class="music-buttons">
                        <button class="play-btn">
                            <i class="fa-solid fa-play"></i>
                        </button>
                        <button class="fav-btn">
                            <i class="fa-regular fa-heart"></i>
                        </button>
                    </div>
                </div>

                <div class="music-card">
                    <img src="covers/music3.jpg" alt="Capa da música">
                    <h3 class="music-title">Mais uma Música</h3>
                    <p class="music-artist">Artista</p>
                    <div class="music-buttons">
                        <button class="play-btn">
                            <i class="fa-solid fa-play"></i>
                        </button>
                        <button class="fav-btn">
                            <i class="fa-regular fa-heart"></i>
                        </button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <footer class="player">
        <div class="music-info">
            <img src="covers/music1.jpg" id="cover">
            <div>
                <p id="music-title">Nome da Música</p>
                <p id="music-artist">Artista</p>
            </div>
        </div>
        <div class="controls">
            <button>
                <i class="fa-solid fa-backward"></i>
            </button>
            <button>
                <i class="fa-solid fa-play"></i>
            </button>
            <button>
                <i class="fa-solid fa-forward"></i>
            </button>
        </div>
        <div class="progress">
            <span>0:00</span>
            <input type="range" value="0">
            <span>3:00</span>
        </div>
    </footer>
</body>
</html>
