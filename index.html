<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="./css/app.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <title>peMusic</title>
</head>

<body>

    <div class="container">
        <aside class="sidebar">
            <h2>peMusic</h2>
            <nav>
                <ul>
                    <li id="btn-home">
                        <i class="fa-solid fa-house"></i>
                        Home
                    </li>

                    <li id="btn-search">
                        <i class="fa-solid fa-magnifying-glass"></i>
                        Buscar
                    </li>

                    <li id="btn-playlists">
                        <i class="fa-solid fa-list"></i>
                        Playlists
                    </li>

                    <li id="btn-favorites">
                        <i class="fa-solid fa-heart"></i>
                        Favoritos
                    </li>
                </ul>
            </nav>
        </aside>

        <main class="main">
            <div class="main-header">
                <div>
                    <h1>Suas músicas</h1>
                    <p id="user-greeting" class="user-greeting">Olá, seja bem-vindo!</p>
                </div>
                <button id="logout" class="logout-btn">Sair</button>
            </div>
            <input id="search-input" type="search" placeholder="Buscar título ou artista" style="width:100%; padding:8px 12px; margin-bottom:15px; border-radius:8px; border:1px solid #333; background:#0f0f1a; color:white;" />
            <div id="music-list" class="music-list"></div>
        </main>
    </div>

    <footer class="player">
        <div class="music-info">
            <img src="covers/music1.jpg" id="cover">
            <div>
                <p id="player-title">Nome da música</p>
                <p id="player-artist">Artista</p>
            </div>

        </div>

        <div class="player-center">
            <div class="controls">
                <button id="prev">
                    <i class="fa-solid fa-backward"></i>
                </button>
                <button id="play">
                    <i class="fa-solid fa-play"></i>
                </button>
                <button id="next">
                    <i class="fa-solid fa-forward"></i>
                </button>
            </div>
            <div class="progress">
                <span id="current-time">0:00</span>
                <input type="range" id="progress-bar" min="0" max="100" value="0">
                <span id="duration">3:20</span>
            </div>
        </div>
        <div class="volume-panel">
            <i class="fa-solid fa-volume-high"></i>
            <input id="volume-bar" type="range" min="0" max="100" value="80">
        </div>
    </footer>
    <audio id="audio-player"></audio>
    <script type="module" src="./js/app.js"></script>
</body>
</html>
